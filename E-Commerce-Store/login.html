<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>

    <div class="logo">SHOPZONE</div>

</header>

<section class="form-section">

    <div class="form-card">

        <h1>User Login</h1>

        <form id="loginForm">

            <input type="email"
            placeholder="Email Address"
            required>

            <input type="password"
            placeholder="Password"
            required>

            <button type="submit">

                Login

            </button>

        </form>

    </div>

</section>

<footer>

    <p>© 2026 SHOPZONE</p>

</footer>

<script src="script.js"></script>

</body>
</html>
