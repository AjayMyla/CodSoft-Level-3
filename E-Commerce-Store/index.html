<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Store</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>

    <div class="logo">SHOPZONE</div>

    <nav>

        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="cart.html">Cart</a>
        <a href="login.html">Login</a>

    </nav>

    <button id="themeToggle">🌙</button>

</header>

<!-- Hero -->

<section class="hero">

    <div class="hero-text">

        <h1>Premium Shopping Experience</h1>

        <p>
            Discover modern fashion, electronics,
            accessories, and premium products.
        </p>

        <a href="products.html">

            <button>Shop Now</button>

        </a>

    </div>

    <div class="hero-image">

        <img src="banner.jpg" alt="Banner">

    </div>

</section>

<!-- Categories -->

<section class="categories">

    <h2>Popular Categories</h2>

    <div class="category-container">

        <div class="category-card">
            Electronics
        </div>

        <div class="category-card">
            Fashion
        </div>

        <div class="category-card">
            Shoes
        </div>

        <div class="category-card">
            Accessories
        </div>

    </div>

</section>

<!-- Stats -->

<section class="stats-section">

    <div class="stat-card">

        <h2 id="productsCount">0</h2>

        <p>Products</p>

    </div>

    <div class="stat-card">

        <h2 id="usersCount">0</h2>

        <p>Customers</p>

    </div>

    <div class="stat-card">

        <h2 id="ordersCount">0</h2>

        <p>Orders</p>

    </div>

</section>

<footer>

    <p>© 2026 SHOPZONE | All Rights Reserved</p>

</footer>

<script src="script.js"></script>

</body>
</html>
